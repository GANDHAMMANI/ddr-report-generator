<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DDR Report Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
            padding: 48px 40px;
            width: 100%;
            max-width: 560px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 26px;
            font-weight: 800;
            color: #1e3a5f;
        }

        .logo p {
            color: #6b7280;
            font-size: 14px;
            margin-top: 6px;
        }

        .upload-zone {
            border: 2px dashed #d1d5db;
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 16px;
            transition: border-color .2s, background .2s;
            cursor: pointer;
        }

        .upload-zone:hover,
        .upload-zone.dragover {
            border-color: #1e3a5f;
            background: #eff6ff;
        }

        .upload-zone.has-file {
            border-color: #16a34a;
            background: #f0fdf4;
        }

        .upload-label {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 32px;
        }

        .upload-text h3 {
            font-size: 15px;
            font-weight: 600;
            color: #1f2937;
        }

        .upload-text p {
            font-size: 13px;
            color: #6b7280;
            margin-top: 2px;
        }

        .upload-text .file-name {
            color: #16a34a;
            font-weight: 500;
            font-size: 13px;
            margin-top: 4px;
        }

        input[type="file"] {
            display: none;
        }

        .btn-generate {
            width: 100%;
            padding: 14px;
            background: #1e3a5f;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: background .2s, transform .1s;
        }

        .btn-generate:hover:not(:disabled) {
            background: #1e40af;
            transform: translateY(-1px);
        }

        .btn-generate:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }

        /* Progress */
        .progress-section {
            display: none;
            margin-top: 24px;
        }

        .progress-bar-wrap {
            background: #e5e7eb;
            border-radius: 99px;
            height: 10px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #1e3a5f, #3b82f6);
            border-radius: 99px;
            transition: width .5s ease;
            width: 0%;
        }

        .progress-msg {
            font-size: 13px;
            color: #6b7280;
            text-align: center;
        }

        .progress-pct {
            font-size: 14px;
            font-weight: 700;
            color: #1e3a5f;
            text-align: center;
            margin-bottom: 4px;
        }

        /* Result */
        .result-section {
            display: none;
            margin-top: 24px;
        }

        .result-title {
            font-size: 17px;
            font-weight: 700;
            color: #16a34a;
            text-align: center;
            margin-bottom: 16px;
        }

        .download-btns {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .btn-download {
            padding: 12px 8px;
            border-radius: 8px;
            border: none;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .2s;
            text-decoration: none;
            text-align: center;
            display: block;
        }

        .btn-html {
            background: #dbeafe;
            color: #1e40af;
        }

        .btn-docx {
            background: #dcfce7;
            color: #166534;
        }

        .btn-pdf {
            background: #fee2e2;
            color: #991b1b;
        }

        .btn-download:hover {
            opacity: .8;
        }

        .btn-preview {
            display: block;
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            background: #f3f4f6;
            border: none;
            border-radius: 8px;
            color: #1f2937;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-preview:hover {
            background: #e5e7eb;
        }

        /* Error */
        .error-msg {
            display: none;
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
        }

        .divider {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 24px 0;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #9ca3af;
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <h1>🏗️ DDR Report Generator</h1>
            <p>AI-powered Detailed Diagnostic Report from inspection data</p>
        </div>

        <!-- Inspection Upload -->
        <div class="upload-zone" id="zone-inspection" ondragover="handleDragOver(event,'inspection')"
            ondragleave="handleDragLeave('inspection')" ondrop="handleDrop(event,'inspection')">
            <label class="upload-label" for="file-inspection">
                <span class="upload-icon">📄</span>
                <div class="upload-text">
                    <h3>Inspection Report</h3>
                    <p>Visual site inspection PDF</p>
                    <span class="file-name" id="name-inspection">No file selected</span>
                </div>
            </label>
            <input type="file" id="file-inspection" accept=".pdf" onchange="handleFileSelect('inspection')" />
        </div>

        <!-- Thermal Upload -->
        <div class="upload-zone" id="zone-thermal" ondragover="handleDragOver(event,'thermal')"
            ondragleave="handleDragLeave('thermal')" ondrop="handleDrop(event,'thermal')">
            <label class="upload-label" for="file-thermal">
                <span class="upload-icon">🌡️</span>
                <div class="upload-text">
                    <h3>Thermal Report</h3>
                    <p>Thermal imaging scan PDF</p>
                    <span class="file-name" id="name-thermal">No file selected</span>
                </div>
            </label>
            <input type="file" id="file-thermal" accept=".pdf" onchange="handleFileSelect('thermal')" />
        </div>

        <button class="btn-generate" id="btn-generate" disabled onclick="generateReport()">
            Generate DDR Report
        </button>

        <!-- Progress -->
        <div class="progress-section" id="progress-section">
            <hr class="divider" />
            <div class="progress-pct" id="progress-pct">0%</div>
            <div class="progress-bar-wrap">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="progress-msg" id="progress-msg">Starting pipeline...</div>
        </div>

        <!-- Result -->
        <div class="result-section" id="result-section">
            <hr class="divider" />
            <div class="result-title">✅ DDR Report Ready!</div>
            <div class="download-btns">
                <a class="btn-download btn-html" id="btn-html" href="#" target="_blank">🌐 HTML</a>
                <a class="btn-download btn-docx" id="btn-docx" href="#">📄 DOCX</a>
                <a class="btn-download btn-pdf" id="btn-pdf" href="#">📕 PDF</a>
            </div>
            <button class="btn-preview" onclick="previewReport()">👁️ Preview in Browser</button>
        </div>

        <!-- Error -->
        <div class="error-msg" id="error-msg"></div>

        <div class="info-row">
            <span>Max file size: 50MB each</span>
            <span>Powered by Groq + Llama 3.3</span>
        </div>
    </div>

    <script>
        let files = { inspection: null, thermal: null };
        let currentJobId = null;
        let pollInterval = null;

        // ── File Handling ──────────────────────────────────────────────────────────
        function handleFileSelect(type) {
            const input = document.getElementById(`file-${type}`);
            if (input.files[0]) setFile(type, input.files[0]);
        }

        function handleDragOver(e, type) {
            e.preventDefault();
            document.getElementById(`zone-${type}`).classList.add('dragover');
        }

        function handleDragLeave(type) {
            document.getElementById(`zone-${type}`).classList.remove('dragover');
        }

        function handleDrop(e, type) {
            e.preventDefault();
            document.getElementById(`zone-${type}`).classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.pdf')) {
                setFile(type, file);
                // Assign to file input too
                const dt = new DataTransfer();
                dt.items.add(file);
                document.getElementById(`file-${type}`).files = dt.files;
            }
        }

        function setFile(type, file) {
            files[type] = file;
            const nameEl = document.getElementById(`name-${type}`);
            const zone = document.getElementById(`zone-${type}`);
            nameEl.textContent = `✓ ${file.name}`;
            zone.classList.add('has-file');
            checkBothFiles();
        }

        function checkBothFiles() {
            const btn = document.getElementById('btn-generate');
            btn.disabled = !(files.inspection && files.thermal);
        }

        // ── Generate ───────────────────────────────────────────────────────────────
        async function generateReport() {
            hideError();
            showProgress();

            const formData = new FormData();
            formData.append('inspection_report', files.inspection);
            formData.append('thermal_report', files.thermal);

            try {
                const res = await fetch('/api/v1/upload', { method: 'POST', body: formData });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Upload failed');
                }
                const data = await res.json();
                currentJobId = data.job_id;
                startPolling();
            } catch (e) {
                showError(e.message);
                hideProgress();
            }
        }

        // ── Polling ────────────────────────────────────────────────────────────────
        function startPolling() {
            pollInterval = setInterval(pollStatus, 2000);
        }

        async function pollStatus() {
            try {
                const res = await fetch(`/api/v1/status/${currentJobId}`);
                const data = await res.json();

                updateProgress(data.progress, data.message);

                if (data.status === 'done') {
                    clearInterval(pollInterval);
                    await fetchReportLinks();
                } else if (data.status === 'failed') {
                    clearInterval(pollInterval);
                    showError(data.error || 'Pipeline failed');
                    hideProgress();
                }
            } catch (e) {
                clearInterval(pollInterval);
                showError('Lost connection to server');
            }
        }

        async function fetchReportLinks() {
            const res = await fetch(`/api/v1/report/${currentJobId}`);
            const data = await res.json();
            if (data.download_links) {
                showResult(data.download_links);
            }
        }

        // ── UI Helpers ─────────────────────────────────────────────────────────────
        function updateProgress(pct, msg) {
            document.getElementById('progress-bar').style.width = `${pct}%`;
            document.getElementById('progress-pct').textContent = `${pct}%`;
            document.getElementById('progress-msg').textContent = msg;
        }

        function showProgress() {
            document.getElementById('progress-section').style.display = 'block';
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('btn-generate').disabled = true;
            updateProgress(5, 'Uploading files...');
        }

        function hideProgress() {
            document.getElementById('progress-section').style.display = 'none';
            document.getElementById('btn-generate').disabled = false;
        }

        function showResult(links) {
            document.getElementById('progress-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            document.getElementById('btn-html').href = links.html;
            document.getElementById('btn-docx').href = links.docx;
            document.getElementById('btn-pdf').href = links.pdf;
        }

        function previewReport() {
            window.open(`/api/v1/report/${currentJobId}/preview`, '_blank');
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = `❌ ${msg}`;
            el.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error-msg').style.display = 'none';
        }
    </script>
</body>

</html>
